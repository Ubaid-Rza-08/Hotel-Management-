services:

  auth-service:
    image: ubaidrza/mmv3-auth:0.0.1-SNAPSHOT
    container_name: hotel-auth-service
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ${FIREBASE_HOST_KEY_PATH}:/app/firebase-service-account.json:ro
    networks:
      - hotel-network
    restart: unless-stopped

  hotel-listing-service:
    image: ubaidrza/mmv3-hotel-listing-service:0.0.1-SNAPSHOT
    container_name: hotel-listing-service
    ports:
      - "8082:8082"
    env_file:
      - .env
    volumes:
      - ${FIREBASE_HOST_KEY_PATH}:/app/firebase-service-account.json:ro
    networks:
      - hotel-network
    restart: unless-stopped
    depends_on:
      - auth-service

  room-listing-service:
    image: ubaidrza/mmv3-room-listing-service:0.0.1-SNAPSHOT
    container_name: room-listing-service
    ports:
      - "8083:8083"
    env_file:
      - .env
    volumes:
      - ${FIREBASE_HOST_KEY_PATH}:/app/firebase-service-account.json:ro
    networks:
      - hotel-network
    restart: unless-stopped
    depends_on:
      - auth-service
      - hotel-listing-service

  booking-service:
    image: ubaidrza/mmv3-booking-service:0.0.1-SNAPSHOT
    container_name: booking-service
    ports:
      - "8084:8084"
    env_file:
      - .env
    volumes:
      - ${FIREBASE_HOST_KEY_PATH}:/app/firebase-service-account.json:ro
    networks:
      - hotel-network
    restart: unless-stopped
    depends_on:
      - auth-service
      - hotel-listing-service
      - room-listing-service

networks:
  hotel-network:
    driver: bridge
    name: hotel-management-network