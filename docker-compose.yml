# Run:  docker compose down && docker compose up -d --build

services:

  auth-service:
    build:
      context: ./Auth
      dockerfile: Dockerfile
    image: ubaidrza/mmv3-auth:0.0.1-SNAPSHOT
    container_name: hotel-auth-service
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - ${FIREBASE_HOST_KEY_PATH}:/app/firebase-service-account.json:ro
    networks:
      - hotel-network
    restart: unless-stopped

  hotel-listing-service:
    build:
      context: ./hotel-listing-service
      dockerfile: Dockerfile
    image: ubaidrza/mmv3-hotel-listing-service:0.0.1-SNAPSHOT
    container_name: hotel-listing-service
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - ${FIREBASE_HOST_KEY_PATH}:/app/firebase-service-account.json:ro
    networks:
      - hotel-network
    restart: unless-stopped
    depends_on:
      - auth-service

  room-listing-service:
    build:
      context: ./room-listing-service
      dockerfile: Dockerfile
    image: ubaidrza/mmv3-room-listing-service:0.0.1-SNAPSHOT
    container_name: room-listing-service
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - ${FIREBASE_HOST_KEY_PATH}:/app/firebase-service-account.json:ro
    networks:
      - hotel-network
    restart: unless-stopped
    depends_on:
      - auth-service
      - hotel-listing-service

  booking-service:
    build:
      context: ./booking-service
      dockerfile: Dockerfile
    image: ubaidrza/mmv3-booking-service:0.0.1-SNAPSHOT
    container_name: booking-service
    ports:
      - "8084:8084"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - ${FIREBASE_HOST_KEY_PATH}:/app/firebase-service-account.json:ro
    networks:
      - hotel-network
    restart: unless-stopped
    depends_on:
      - auth-service
      - hotel-listing-service
      - room-listing-service

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    image: ubaidrza/mmv3-payment-service:0.0.1-SNAPSHOT
    container_name: payment-service
    ports:
      - "8085:8085"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - ${FIREBASE_HOST_KEY_PATH}:/app/firebase-service-account.json:ro
    networks:
      - hotel-network
    restart: unless-stopped
    depends_on:
      - auth-service
      - booking-service

  # ──────────────────────────────────────────────
  # Frontend  (port 3000)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./booking-pro
      dockerfile: Dockerfile
      args:
        # These are baked into the JS bundle at build time
        # Use localhost because the BROWSER calls these URLs directly
        VITE_AUTH_API: http://localhost:8080/api/v1
        VITE_HOTEL_API: http://localhost:8082/api/hotels
        VITE_ROOM_API: http://localhost:8083/api/rooms
        VITE_BOOKING_API: http://localhost:8084/api/bookings
        VITE_PAYMENT_API: http://localhost:8085/api/payments
    image: ubaidrza/mmv3-frontend:0.0.1-SNAPSHOT
    container_name: hotel-frontend
    ports:
      - "3000:80"
    networks:
      - hotel-network
    restart: unless-stopped
    depends_on:
      - auth-service
      - hotel-listing-service
      - room-listing-service
      - booking-service
      - payment-service

networks:
  hotel-network:
    driver: bridge
    name: hotel-management-network