name: CI/CD - Deploy to AWS EKS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER: hotel-management
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:

  # ──────────────────────────────────────────────
  # JOB 1: Build & Push all images to Docker Hub
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./Auth
          dockerfile: ./Auth/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/mmv3-auth:latest,${{ secrets.DOCKER_USERNAME }}/mmv3-auth:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push hotel-listing-service
        uses: docker/build-push-action@v5
        with:
          context: ./hotel-listing-service
          dockerfile: ./hotel-listing-service/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/mmv3-hotel-listing-service:latest,${{ secrets.DOCKER_USERNAME }}/mmv3-hotel-listing-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push room-listing-service
        uses: docker/build-push-action@v5
        with:
          context: ./room-listing-service
          dockerfile: ./room-listing-service/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/mmv3-room-listing-service:latest,${{ secrets.DOCKER_USERNAME }}/mmv3-room-listing-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push booking-service
        uses: docker/build-push-action@v5
        with:
          context: ./booking-service
          dockerfile: ./booking-service/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/mmv3-booking-service:latest,${{ secrets.DOCKER_USERNAME }}/mmv3-booking-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push payment-service
        uses: docker/build-push-action@v5
        with:
          context: ./payment-service
          dockerfile: ./payment-service/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/mmv3-payment-service:latest,${{ secrets.DOCKER_USERNAME }}/mmv3-payment-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./booking-pro
          dockerfile: ./booking-pro/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/mmv3-frontend:latest,${{ secrets.DOCKER_USERNAME }}/mmv3-frontend:${{ github.sha }}
          build-args: |
            VITE_AUTH_API=${{ secrets.VITE_AUTH_API }}
            VITE_HOTEL_API=${{ secrets.VITE_HOTEL_API }}
            VITE_ROOM_API=${{ secrets.VITE_ROOM_API }}
            VITE_BOOKING_API=${{ secrets.VITE_BOOKING_API }}
            VITE_PAYMENT_API=${{ secrets.VITE_PAYMENT_API }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # JOB 2: Deploy to AWS EKS
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Create namespace
        run: |
          kubectl apply -f k8s/common/namespace.yml

      - name: Apply Kubernetes Secrets
        run: |
          kubectl create secret generic hotel-secrets \
            --namespace=hotel-management \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=FIREBASE_PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}" \
            --from-literal=CLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}" \
            --from-literal=CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}" \
            --from-literal=CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}" \
            --from-literal=GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --from-literal=GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --from-literal=MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" \
            --from-literal=MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
            --from-literal=RAZORPAY_KEY_ID="${{ secrets.RAZORPAY_KEY_ID }}" \
            --from-literal=RAZORPAY_KEY_SECRET="${{ secrets.RAZORPAY_KEY_SECRET }}" \
            --from-literal=FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Firebase secret
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > firebase-service-account.json
          kubectl create secret generic firebase-secret \
            --namespace=hotel-management \
            --from-file=firebase-service-account.json=firebase-service-account.json \
            --dry-run=client -o yaml | kubectl apply -f -
          rm firebase-service-account.json

      - name: Update image tags
        run: |
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/auth/deployment.yml
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/hotel/deployment.yml
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/room/deployment.yml
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/booking/deployment.yml
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/payment/deployment.yml
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/frontend/deployment.yml

      - name: Deploy all services
        run: |
          kubectl apply -f k8s/common/
          kubectl apply -f k8s/auth/
          kubectl apply -f k8s/hotel/
          kubectl apply -f k8s/room/
          kubectl apply -f k8s/booking/
          kubectl apply -f k8s/payment/
          kubectl apply -f k8s/frontend/

      # ── Wait with longer timeout + debug on failure ──
      - name: Wait for auth-service rollout
        run: |
          kubectl rollout status deployment/auth-service \
            -n hotel-management --timeout=300s || \
          (echo "❌ auth-service failed. Pod logs:" && \
           kubectl describe pods -l app=auth-service -n hotel-management && \
           kubectl logs -l app=auth-service -n hotel-management --tail=50 && \
           exit 1)

      - name: Wait for hotel-listing-service rollout
        run: |
          kubectl rollout status deployment/hotel-listing-service \
            -n hotel-management --timeout=300s || \
          (echo "❌ hotel-listing-service failed. Pod logs:" && \
           kubectl describe pods -l app=hotel-listing-service -n hotel-management && \
           kubectl logs -l app=hotel-listing-service -n hotel-management --tail=50 && \
           exit 1)

      - name: Wait for room-listing-service rollout
        run: |
          kubectl rollout status deployment/room-listing-service \
            -n hotel-management --timeout=300s || \
          (echo "❌ room-listing-service failed. Pod logs:" && \
           kubectl describe pods -l app=room-listing-service -n hotel-management && \
           kubectl logs -l app=room-listing-service -n hotel-management --tail=50 && \
           exit 1)

      - name: Wait for booking-service rollout
        run: |
          kubectl rollout status deployment/booking-service \
            -n hotel-management --timeout=300s || \
          (echo "❌ booking-service failed. Pod logs:" && \
           kubectl describe pods -l app=booking-service -n hotel-management && \
           kubectl logs -l app=booking-service -n hotel-management --tail=50 && \
           exit 1)

      - name: Wait for payment-service rollout
        run: |
          kubectl rollout status deployment/payment-service \
            -n hotel-management --timeout=300s || \
          (echo "❌ payment-service failed. Pod logs:" && \
           kubectl describe pods -l app=payment-service -n hotel-management && \
           kubectl logs -l app=payment-service -n hotel-management --tail=50 && \
           exit 1)

      - name: Wait for frontend rollout
        run: |
          kubectl rollout status deployment/frontend \
            -n hotel-management --timeout=180s || \
          (echo "❌ frontend failed. Pod logs:" && \
           kubectl describe pods -l app=frontend -n hotel-management && \
           kubectl logs -l app=frontend -n hotel-management --tail=50 && \
           exit 1)

      - name: Get Load Balancer URL
        run: |
          echo "⏳ Waiting for LoadBalancer IP..."
          sleep 30
          echo "🚀 Your app is live at:"
          kubectl get svc frontend -n hotel-management \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
          echo ""
          echo "📋 All services:"
          kubectl get all -n hotel-management