# Production compose - pulls images from Docker Hub, no local build
# Used by GitHub Actions deploy job on the server

services:

  auth-service:
    image: ubaidrza/mmv3-auth:latest
    container_name: hotel-auth-service
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - ${FIREBASE_HOST_KEY_PATH}:/app/firebase-service-account.json:ro
    networks:
      - hotel-network
    restart: unless-stopped

  hotel-listing-service:
    image: ubaidrza/mmv3-hotel-listing-service:latest
    container_name: hotel-listing-service
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - ${FIREBASE_HOST_KEY_PATH}:/app/firebase-service-account.json:ro
    networks:
      - hotel-network
    restart: unless-stopped
    depends_on:
      - auth-service

  room-listing-service:
    image: ubaidrza/mmv3-room-listing-service:latest
    container_name: room-listing-service
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - ${FIREBASE_HOST_KEY_PATH}:/app/firebase-service-account.json:ro
    networks:
      - hotel-network
    restart: unless-stopped
    depends_on:
      - auth-service
      - hotel-listing-service

  booking-service:
    image: ubaidrza/mmv3-booking-service:latest
    container_name: booking-service
    ports:
      - "8084:8084"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - ${FIREBASE_HOST_KEY_PATH}:/app/firebase-service-account.json:ro
    networks:
      - hotel-network
    restart: unless-stopped
    depends_on:
      - auth-service
      - hotel-listing-service
      - room-listing-service

  payment-service:
    image: ubaidrza/mmv3-payment-service:latest
    container_name: payment-service
    ports:
      - "8085:8085"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - ${FIREBASE_HOST_KEY_PATH}:/app/firebase-service-account.json:ro
    networks:
      - hotel-network
    restart: unless-stopped
    depends_on:
      - auth-service
      - booking-service

  frontend:
    image: ubaidrza/mmv3-frontend:latest
    container_name: hotel-frontend
    ports:
      - "3000:80"
    networks:
      - hotel-network
    restart: unless-stopped
    depends_on:
      - auth-service
      - hotel-listing-service
      - room-listing-service
      - booking-service
      - payment-service

networks:
  hotel-network:
    driver: bridge
    name: hotel-management-network